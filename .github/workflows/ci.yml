name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check
      - run: uvx ruff format --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --uv --extras dev
      - run: uv run pytest

  test-polycomb:
    name: Test polycomb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --package polycomb --extra dev
      # polycomb imports homeobox, which is a maturin (Rust) extension, so it
      # must be compiled into the workspace venv before the tests can import it.
      - uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --uv
      # Run from the package dir: tests/curation reference a skill script via a
      # path relative to the working directory. --project points uv at the
      # workspace root so it reuses the synced venv instead of re-resolving.
      - run: uv run --project ${{ github.workspace }} pytest
        working-directory: packages/polycomb
