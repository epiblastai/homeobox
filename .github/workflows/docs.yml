name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install docs dependencies
        run: pip install "mkdocs-material>=9.5" "mkdocstrings[python]>=0.27"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
