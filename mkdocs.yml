site_name: homeobox
site_url: https://epiblastai.github.io/homeobox/
site_description: Multimodal biomedical databases built on LanceDB and Zarr
repo_url: https://github.com/epiblastai/homeobox
repo_name: epiblastai/homeobox

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - monorepo
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Overview: index.md
  - Tutorials:
    - Building an Atlas: atlas.md
  - Concepts:
    - Feature Registries: feature_registries.md
    - Feature Layouts: feature_layouts.md
    - Array Storage: array_storage.md
    - Versioning: versioning.md
  - Reference:
    - Schemas: schemas.md
    - Pointer Types: pointer_types.md
    - BatchArray: batch_array.md
    - Querying: querying.md
    - Ingestion: ingestion.md
    - Reconstructors: reconstructors.md
    - PyTorch Data Loading: dataloader.md
  - Benchmarks:
    - Dataloader Benchmark: dataloader_benchmark.md
  - Polycomb: '!include ./packages/polycomb/mkdocs.yml'

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
